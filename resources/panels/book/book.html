<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL Notebook</title>
    <meta http-equiv="Content-Security-Policy" content="{{csp}}" />
    <script
      nonce="{{resource-nonce}}"
      src="{{node-resources-uri}}/jquery/dist/jquery.min.js"
    ></script>
    <script
      nonce="{{resource-nonce}}"
      src="{{node-resources-uri}}/layui/dist/layui.js"
    ></script>
    <link
      rel="stylesheet"
      href="{{node-resources-uri}}/layui/dist/css/layui.css"
    />
    <link rel="stylesheet" href="{{resources-uri}}/common/layui-theme.css" />
    <link rel="stylesheet" href="{{resources-uri}}/book/book.css" />
    <script
      nonce="{{resource-nonce}}"
      src="{{node-resources-uri}}/monaco-editor/min/vs/loader.js"
    ></script>
  </head>
  <body>
    <!-- 顶部工具栏 -->
    <div class="notebook-header">
      <div class="header-left">
        <h2 class="notebook-title">SQL Notebook</h2>
      </div>
      <div class="header-right">
        <div class="datasource-selector">
          <select id="datasourceSelect" class="native-select">
            <option value="">选择数据源</option>
          </select>
        </div>
        <div class="database-selector">
          <select id="databaseSelect" class="native-select" disabled>
            <option value="">选择数据库</option>
          </select>
        </div>
        <button id="btnSaveNotebook" class="layui-btn layui-btn-sm layui-btn-normal">
          <i class="layui-icon layui-icon-file"></i> 保存
        </button>
        <button id="btnAddCell" class="layui-btn layui-btn-sm">
          <i class="layui-icon layui-icon-add-1"></i> 添加 Cell
        </button>
      </div>
    </div>

    <!-- Notebook 内容区域 -->
    <div class="notebook-container" id="notebookContainer">
      <!-- SQL Cell 将动态添加到这里 -->
    </div>

    <script nonce="{{resource-nonce}}">
      // 在页面加载时设置 Monaco Editor 路径
      window.MONACO_BASE_PATH = "{{node-resources-uri}}";
      
      // 屏蔽 VSCode 快捷键
      document.addEventListener('keydown', function(e) {
        // 屏蔽 F1 (命令面板)
        if (e.key === 'F1') {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        // 屏蔽 Ctrl+Shift+P (命令面板)
        if (e.ctrlKey && e.shiftKey && e.key === 'P') {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        // 屏蔽 Ctrl+K (快捷键命令)
        if (e.ctrlKey && e.key === 'k') {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        // 屏蔽 Ctrl+Shift+E (资源管理器)
        if (e.ctrlKey && e.shiftKey && e.key === 'E') {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        // 屏蔽 Ctrl+B (侧边栏切换)
        if (e.ctrlKey && e.key === 'b') {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
      }, true);
    </script>
    <script
      nonce="{{resource-nonce}}"
      src="{{resources-uri}}/book/book.js"
    ></script>
  </body>
</html>
