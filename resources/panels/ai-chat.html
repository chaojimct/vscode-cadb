<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="{{csp}}" />
  <link rel="stylesheet" href="{{resources-uri}}/ai-chat/vendor/chatarea/lib/ChatArea.css" />
  <link rel="stylesheet" href="{{resources-uri}}/ai-chat/vendor/codicons/dist/codicon.css" />
  <link rel="stylesheet" href="{{resources-uri}}/ai-chat/ai-chat.css" />
  <title>AI 数据库助手</title>
</head>
<body>
  <!-- 顶部栏 -->
  <header class="chat-header">
    <div class="chat-header-left">
      <span class="chat-header-icon">&#x1F916;</span>
      <span class="chat-header-title">AI 数据库助手</span>
      <span class="chat-header-db" id="dbLabel"></span>
      <div class="session-toolbar" title="会话">
        <select id="sessionSelect" class="session-select" aria-label="当前会话"></select>
        <button type="button" class="icon-btn" id="sessionNewBtn" title="新建会话">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1v6h6v2H8v6H6V9H0V7h6V1h2z"/></svg>
        </button>
        <button type="button" class="icon-btn" id="sessionDelBtn" title="删除当前会话">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M5 1h6l1 2h3v2H0V3h3l1-2zm-2 5h10l-1 10H4L3 6z"/></svg>
        </button>
      </div>
    </div>
    <div class="chat-header-right">
      <button class="icon-btn" id="clearBtn" title="清空对话">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm3.5 9.5l-1 1L8 9l-2.5 2.5-1-1L7 8 4.5 5.5l1-1L8 7l2.5-2.5 1 1L9 8l2.5 2.5z"/></svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="API 设置">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M6.2 1L6 1.4l-.4 1.7c-.4.2-.8.4-1.1.7l-1.7-.5-.3.1-.9 1.5v.4l1.3 1.1c0 .2-.1.5-.1.7s0 .5.1.7L1.6 8.9v.4l.9 1.5.3.1 1.7-.5c.4.3.7.5 1.1.7l.4 1.7.2.2h1.8l.2-.2.4-1.7c.4-.2.8-.4 1.1-.7l1.7.5.3-.1.9-1.5v-.4L9.3 8c0-.2.1-.5.1-.7s0-.5-.1-.7l1.3-1.1v-.4l-.9-1.5-.3-.1-1.7.5c-.4-.3-.7-.5-1.1-.7L6.2 1.6 6 1.4V1H6.2zM7 5.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/></svg>
      </button>
    </div>
  </header>

  <!-- 设置面板浮层 -->
  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-panel">
      <div class="settings-title">API 配置</div>
      <div class="settings-field">
        <label>API Key</label>
        <div class="input-with-eye">
          <input type="password" id="cfgApiKey" placeholder="sk-..." />
          <button class="eye-btn" id="toggleApiKey" title="显示/隐藏">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3C4.7 3 2 6.1 1.2 8c.8 1.9 3.5 5 6.8 5s6-3.1 6.8-5c-.8-1.9-3.5-5-6.8-5zm0 8a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0-4.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"/></svg>
          </button>
        </div>
      </div>
      <div class="settings-field">
        <label>Base URL</label>
        <input type="text" id="cfgBaseUrl" placeholder="https://api.openai.com/v1" />
      </div>
      <div class="settings-field">
        <label>Model</label>
        <input type="text" id="cfgModel" placeholder="gpt-4o" />
      </div>
      <div class="settings-actions">
        <button class="btn-secondary" id="settingsCancelBtn">取消</button>
        <button class="btn-primary" id="settingsSaveBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- 数据库选择屏（新会话未选库时居中显示） -->
  <div class="db-picker-screen" id="dbPickerScreen">
    <div class="db-picker-card">
      <div class="db-picker-icon">
        <svg width="40" height="40" viewBox="0 0 16 16" fill="currentColor" opacity=".6"><path d="M8 1C4.7 1 2 2.1 2 3.5v9C2 13.9 4.7 15 8 15s6-1.1 6-2.5v-9C14 2.1 11.3 1 8 1zM3.5 12.5v-2.2c1 .7 2.7 1.2 4.5 1.2s3.5-.5 4.5-1.2v2.2c0 .6-1.7 1.5-4.5 1.5s-4.5-.9-4.5-1.5zm0-4v-2.2c1 .7 2.7 1.2 4.5 1.2s3.5-.5 4.5-1.2v2.2c0 .6-1.7 1.5-4.5 1.5s-4.5-.9-4.5-1.5zM8 5.5c-2.8 0-4.5-.9-4.5-1.5S5.2 2.5 8 2.5s4.5.9 4.5 1.5S10.8 5.5 8 5.5z"/></svg>
      </div>
      <div class="db-picker-title">选择数据库</div>
      <div class="db-picker-hint">请选择本次对话要使用的数据源和数据库</div>
      <select id="dbPicker" class="db-picker-select">
        <option value="" disabled selected>-- 请选择 --</option>
      </select>
      <button type="button" class="btn-primary db-picker-btn" id="dbPickerConfirm" disabled>开始对话</button>
    </div>
  </div>

  <!-- 消息列表 -->
  <div class="chat-messages" id="chatMessages">
    <div class="welcome-msg">
      <div class="welcome-icon">&#x1F4AC;</div>
      <div class="welcome-title">你好，我是数据库 AI 助手</div>
      <div class="welcome-hint">你可以向我提问 SQL 编写、表结构设计、查询优化等数据库相关问题。<br/>输入 <b>@</b> 可插入表名。</div>
    </div>
  </div>

  <!-- 底部输入区 -->
  <div class="chat-input-area" id="chatInputArea">
    <div class="chat-mode-bar" id="chatModeBar">
      <label class="quick-mode-toggle" title="开启后单次 function calling 仅调用 execute_sql 一次，直接生成并执行最终 SQL">
        <input type="checkbox" id="quickQueryToggle" />
        <span class="quick-mode-toggle-track" aria-hidden="true"></span>
        <span class="quick-mode-toggle-text">快速查询</span>
      </label>
      <span class="quick-mode-desc">单次生成并执行 SQL</span>
    </div>
    <div id="chatInput"></div>
  </div>

  <script nonce="{{resource-nonce}}" src="{{resources-uri}}/ai-chat/vendor/chatarea/lib/ChatArea.umd.js"></script>
  <script nonce="{{resource-nonce}}" src="{{resources-uri}}/ai-chat/vendor/marked/lib/marked.umd.js"></script>
  <script nonce="{{resource-nonce}}" src="{{resources-uri}}/ai-chat/ai-chat.js"></script>
</body>
</html>
