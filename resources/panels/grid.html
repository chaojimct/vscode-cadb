<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数据表格编辑器</title>
    <meta http-equiv="Content-Security-Policy" content="{{csp}}" />
    <link rel="stylesheet" href="{{node-resources-uri}}/layui/dist/css/layui.css" />
    <link rel="stylesheet" href="{{resources-uri}}/common/layui-theme.css" />
    <link rel="stylesheet" href="{{node-resources-uri}}/@vscode/codicons/dist/codicon.css" />
    <link rel="stylesheet" href="{{resources-uri}}/common/table.css" />
    <link rel="stylesheet" href="{{resources-uri}}/grid/grid.css" />
  </head>
  <body class="grid-body">
    <div class="grid-main">
    <header class="grid-toolbar">
      <div class="grid-toolbar__nav">
        <button type="button" data-action="switchToTableEdit" title="切换至表结构编辑" aria-label="切换至表结构编辑">
          <i class="codicon codicon-edit-sparkle" aria-hidden="true"></i>
          <span class="sr-only">表编辑</span>
        </button>
        <button type="button" data-action="quickQuery" title="新建或选择查询文件，快速添加 SELECT 语句" aria-label="快捷查询">
          <i class="codicon codicon-search-sparkle" aria-hidden="true"></i>
          <span class="sr-only">快捷查询</span>
        </button>
      </div>
      <div class="grid-toolbar__actions">
        <button data-action="save" title="保存修改到数据库">
          <i class="codicon codicon-save" aria-hidden="true"></i>
          <span class="sr-only">保存</span>
        </button>
        <button data-action="refresh" title="刷新表格数据">
          <i class="codicon codicon-refresh" aria-hidden="true"></i>
          <span class="sr-only">刷新</span>
        </button>
        <button data-action="add" title="添加新行">
          <i class="codicon codicon-add" aria-hidden="true"></i>
          <span class="sr-only">新增</span>
        </button>
        <button data-action="delete" title="删除选中行">
          <i class="codicon codicon-trash" aria-hidden="true"></i>
          <span class="sr-only">删除</span>
        </button>
        <button data-action="undo" title="撤销">
          <i class="codicon codicon-history" aria-hidden="true"></i>
          <span class="sr-only">撤销</span>
        </button>
        <button data-action="redo" title="重做">
          <i class="codicon codicon-redo" aria-hidden="true"></i>
          <span class="sr-only">重做</span>
        </button>
      </div>
      <div class="grid-toolbar__pagination" data-pagination>
        <button id="btn-prev-page" data-action="prev-page" title="上一页" disabled>
          <i class="codicon codicon-chevron-left" aria-hidden="true"></i>
        </button>
        <span id="pagination-range" data-pagination-range>0 - 0 / 0</span>
        <button id="btn-next-page" data-action="next-page" title="下一页" disabled>
          <i class="codicon codicon-chevron-right" aria-hidden="true"></i>
        </button>
      </div>
      <div class="grid-toolbar__export">
        <button data-action="upload" title="同步到...">
          <i class="codicon codicon-cloud-upload" aria-hidden="true"></i>
          <span class="sr-only">同步到...</span>
        </button>
        <button data-action="download" title="导出为SQL">
          <i class="codicon codicon-cloud-download" aria-hidden="true"></i>
          <span class="sr-only">导出为SQL</span>
        </button>
        <button data-action="export-csv" title="导出 CSV">
          <i class="codicon codicon-file" aria-hidden="true"></i>
          <span class="sr-only">CSV</span>
        </button>
        <button data-action="export-xlsx" title="导出 XLSX">
          <i class="codicon codicon-table" aria-hidden="true"></i>
          <span class="sr-only">XLSX</span>
        </button>
        <button data-action="export-json" title="导出 JSON">
          <i class="codicon codicon-braces" aria-hidden="true"></i>
          <span class="sr-only">JSON</span>
        </button>
      </div>
    </header>

    <main class="grid-table-wrapper">
      <div id="grid" class="ag-theme-quartz" role="grid"></div>
    </main>
    </div>

    <div class="grid-resizer" data-resizer title="拖拽调整工具栏宽度" aria-label="调整工具栏宽度"></div>
    <aside class="grid-side-panel" id="grid-side-panel" data-side-panel>
      <div class="grid-side-panel__header">
        <span class="grid-side-panel__title">工具栏</span>
        <button type="button" class="grid-side-panel__toggle" data-action="toggleSidePanel" title="收起面板" aria-label="收起侧边面板">
          <i class="codicon codicon-chevron-right" aria-hidden="true"></i>
        </button>
      </div>
      <div class="grid-side-panel__body">
        <div class="grid-side-panel__tabs">
          <button type="button" class="grid-side-panel__tab-btn is-active" data-tab="fields" aria-selected="true">字段</button>
        </div>
        <div class="grid-side-panel__tab-content" data-tab-content="fields">
          <div class="grid-side-panel__toolbar">
            <button type="button" class="grid-side-panel__btn" data-action="selectAllFields" title="全选">全选</button>
            <button type="button" class="grid-side-panel__btn" data-action="invertFields" title="反选">反选</button>
          </div>
          <ul class="grid-side-panel__column-list" id="grid-column-list" role="listbox" aria-label="列显示开关">
            <!-- 由 JS 根据 columnDefs 动态填充 -->
          </ul>
          <p class="grid-side-panel__empty" id="grid-column-list-empty">暂无列数据，请先加载表格。</p>
        </div>
      </div>
    </aside>
    <button type="button" class="grid-side-panel__tab" data-action="toggleSidePanel" title="展开侧边面板" aria-label="展开侧边面板" aria-expanded="false">
      <i class="codicon codicon-chevron-left" aria-hidden="true"></i>
    </button>

    <script nonce="{{resource-nonce}}" src="{{node-resources-uri}}/jquery/dist/jquery.min.js"></script>
    <script nonce="{{resource-nonce}}" src="{{node-resources-uri}}/layui/dist/layui.js"></script>
    <script nonce="{{resource-nonce}}" src="{{resources-uri}}/common/ag-grid-community.min.js"></script>
    <script nonce="{{resource-nonce}}" src="{{resources-uri}}/common/table.js"></script>
    <script nonce="{{resource-nonce}}" src="{{resources-uri}}/grid/grid.js"></script>
  </body>
</html>
