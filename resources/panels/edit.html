<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>编辑表结构</title>
    <meta http-equiv="Content-Security-Policy" content="{{csp}}" />
    <script nonce="{{resource-nonce}}" src="{{node-resources-uri}}/jquery/dist/jquery.min.js"></script>
    <script nonce="{{resource-nonce}}" src="{{node-resources-uri}}/layui/dist/layui.js"></script>
    <link rel="stylesheet" href="{{node-resources-uri}}/layui/dist/css/layui.css" />
    <link rel="stylesheet" href="{{resources-uri}}/common/layui-theme.css" />
    <link rel="stylesheet" href="{{resources-uri}}/common/form.css" />
    <link rel="stylesheet" href="{{resources-uri}}/edit/edit.css" />
  </head>
  <body>
    <div class="edit-container">
      <!-- 左侧：Layui Tab -->
      <div class="left-panel">
        <div class="layui-tab layui-tab-brief edit-tabs" lay-filter="edit-tabs">
          <ul class="layui-tab-title">
            <li class="layui-this">字段</li>
            <li>索引</li>
          </ul>
          <div class="layui-tab-content">
            <div class="layui-tab-item layui-show">
              <div class="tab-pane-inner">
                <button type="button" class="layui-btn layui-btn-sm layui-btn-fluid" id="add-field-btn">
                  <i class="layui-icon layui-icon-add-1"></i> 添加字段
                </button>
                <div class="list-scroll">
                  <ul class="menu-list" id="field-list"></ul>
                </div>
              </div>
            </div>
            <div class="layui-tab-item">
              <div class="tab-pane-inner">
                <button type="button" class="layui-btn layui-btn-sm layui-btn-fluid" id="add-index-btn">
                  <i class="layui-icon layui-icon-add-1"></i> 添加索引
                </button>
                <div class="list-scroll">
                  <ul class="menu-list" id="index-list"></ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 右侧：动态表单 -->
      <div class="right-panel">
        <div id="formContainer"></div>
      </div>
    </div>

    <script nonce="{{resource-nonce}}" src="{{resources-uri}}/common/field-config.js"></script>
    <script nonce="{{resource-nonce}}" src="{{resources-uri}}/common/form.js"></script>
    <script nonce="{{resource-nonce}}" src="{{resources-uri}}/edit/edit.js"></script>
  </body>
</html>
